<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0e1a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tower Defense — Siege Command</title>
    <link rel="manifest" href="manifest.json?v=9">
    <link rel="stylesheet" href="css/style.css?v=9">
</head>
<body>
    <div id="game-container">
        <!-- Game Setup Screen -->
        <div id="game-setup-screen">
            <div id="setup-box">
                <h1>🏰 Tower Defense</h1>
                <p class="setup-subtitle">Defend your castle against waves of enemies!</p>

                <!-- Map Selection -->
                <div class="setup-section">
                    <h2>Select Map</h2>
                    <div id="map-selection">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- Difficulty Selection -->
                <div class="setup-section">
                    <h2>Select Difficulty</h2>
                    <div id="difficulty-selection">
                        <button class="diff-btn" data-difficulty="easy">
                            <span class="diff-icon">🟢</span>
                            <span class="diff-name">Easy</span>
                            <span class="diff-desc">Relaxed pace, more gold, castle heals</span>
                        </button>
                        <button class="diff-btn selected" data-difficulty="normal">
                            <span class="diff-icon">🟡</span>
                            <span class="diff-name">Normal</span>
                            <span class="diff-desc">Standard challenge</span>
                        </button>
                        <button class="diff-btn" data-difficulty="hard">
                            <span class="diff-icon">🔴</span>
                            <span class="diff-name">Hard</span>
                            <span class="diff-desc">Tougher enemies, less gold, early threats</span>
                        </button>
                    </div>
                </div>

                <!-- Start Button -->
                <button id="start-game-btn">⚔️ Start Game</button>
            </div>
        </div>

        <!-- HUD Bar -->
        <div id="hud">
            <div class="hud-item">
                <span class="hud-label">💰 Gold</span>
                <span id="gold-value" class="hud-value">200</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">🏰 Castle</span>
                <span id="castle-hp-value" class="hud-value">2000</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">🌊 Wave</span>
                <span id="wave-value" class="hud-value">0</span>
            </div>
            <div class="hud-item">
                <button id="repair-btn" class="repair-btn" style="display:none;" onclick="window._repairCastle()">🔧 Repair</button>
                <span id="repair-info" class="repair-info" style="display:none;"></span>
            </div>
            <div class="hud-item hud-spacer">
                <button id="wave-btn" class="wave-start-btn">Start Wave 1</button>
            </div>
            <div class="hud-item">
                <div class="speed-controls">
                    <button id="speed-1x" class="speed-btn active" data-speed="1">1×</button>
                    <button id="speed-2x" class="speed-btn" data-speed="2">2×</button>
                    <button id="speed-3x" class="speed-btn" data-speed="3">3×</button>
                </div>
            </div>
        </div>

        <!-- Game Canvas -->
        <div id="canvas-wrapper">
            <canvas id="game-canvas"></canvas>
            <!-- Tower Info Panel (shown when a placed tower is selected) -->
            <div id="tower-info" style="display:none;"></div>
        </div>

        <!-- Tower Selection -->
        <div id="tower-panel">
            <div id="tower-buttons"></div>
        </div>

        <!-- Game Over Overlay -->
        <div id="game-over-overlay" style="display:none;">
            <div id="game-over-box">
                <h1 id="game-over-title">GAME OVER</h1>
                <p id="game-over-stats"></p>
                <div class="game-over-buttons">
                    <button id="restart-btn" class="restart-btn">🔄 Play Again</button>
                    <button id="main-menu-btn" class="menu-btn">🏠 Main Menu</button>
                </div>
            </div>
        </div>

        <!-- Instructions -->
        <div id="instructions">
            <span>Click grid → place tower | Click tower → upgrade/sell | Space → start wave | 1/2/3 → speed | Esc → deselect</span>
        </div>
    </div>

    <!-- Scripts (load order matters) — v9 -->
    <script>
        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js?v=9');
        }
    </script>
    <script src="js/constants.js?v=9"></script>
    <script src="js/sprites.js?v=9"></script>
    <script src="js/sound.js?v=9"></script>
    <script src="js/map.js?v=9"></script>
    <script src="js/maps/crossroads.js?v=9"></script>
    <script src="js/maps/winding_valley.js?v=9"></script>
    <script src="js/maps/frozen_pass.js?v=9"></script>
    <script src="js/maps/fortress_siege.js?v=9"></script>
    <script src="js/maps/desert_oasis.js?v=9"></script>
    <script src="js/maps/jungle_ruins.js?v=9"></script>
    <script src="js/maps/volcanic_caldera.js?v=9"></script>
    <script src="js/maps/coastal_cliffs.js?v=9"></script>
    <script src="js/enemy.js?v=9"></script>
    <script src="js/tower.js?v=9"></script>
    <script src="js/projectile.js?v=9"></script>
    <script src="js/effects.js?v=9"></script>
    <script src="js/wave.js?v=9"></script>
    <script src="js/input.js?v=9"></script>
    <script src="js/ui.js?v=9"></script>
    <script src="js/main.js?v=9"></script>
</body>
</html>
